<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calc</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="calc">
        <input id="display" readonly>
        <div id="keys">
            <div id="keys">
                <button class="operator-btn">+</button>
                <button>7</button>
                <button>8</button>  
                <button>9</button>
                <button class="operator-btn">-</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="operator-btn">*</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="operator-btn">/</button>
                <button>0</button>
                <button>.</button>
                <button id="equals-btn">=</button>
                <button id="clear-btn" class="operator-btn">C</button>
                <button class="invis"></button>
                <button class="invis"></button>
                <button id="backspace-btn" class="backspace-btn">⌫</button>
            </div>
        </div>
    </div>

    <script type="module" src="calc.js"></script>
</body>

</html>
